models:
  - type: main
    engine: configurable
    model: configurable

rails:
  input:
    flows:
      - homework_only
      - safety_check
  output:
    flows:
      - domain_safe_response
      - tutoring_style_response

policies:
  reject_message: "Sorry, I can only help with math or history homework questions."
  allowed_subjects:
    - math
    - history
  summary_triggers:
    - summarize our conversation so far
    - summarise our conversation so far
    - summarize the conversation
    - summarize chat
  unsafe_patterns:
    - build a bomb
    - make a bomb
    - hurt someone
    - self harm
    - suicide
    - kill someone
    - hack a server
    - steal passwords
  clearly_unrelated_patterns:
    - travel plan
    - plan a trip
    - vacation ideas
    - restaurant recommendation
    - movie recommendation
    - sports betting
    - celebrity gossip
  output_blocked_patterns:
    - weapon instructions
    - illegal instructions
    - unrelated travel advice
